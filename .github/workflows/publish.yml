name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify release identity
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          root_version="$(node -p "require('./package.json').version")"
          mcp_version="$(node -p "require('./packages/mcp/package.json').version")"
          if [[ "$tag_version" != "$root_version" || "$tag_version" != "$mcp_version" ]]; then
            echo "Tag v$tag_version does not match root $root_version and MCP $mcp_version."
            exit 1
          fi
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "Tagged commit is not merged into main."
            exit 1
          fi

      - name: Release gate
        run: npm run release:check

      - name: Publish godpowers with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @godpowers/mcp with provenance
        run: npm publish --workspace @godpowers/mcp --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
