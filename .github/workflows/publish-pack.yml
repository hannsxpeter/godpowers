name: Publish extension pack

# Manually publish a first-party extension pack to npm. Triggered from
# the GitHub Actions UI (workflow_dispatch). Bump the pack's package.json
# version first, then run this workflow with the pack name.

on:
  workflow_dispatch:
    inputs:
      pack:
        description: 'Pack to publish (security-pack, launch-pack, data-pack)'
        required: true
        type: choice
        options:
          - security-pack
          - launch-pack
          - data-pack

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @godpowers/${{ inputs.pack }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify pack publishability
        run: npm run release:check

      - name: Publish pack
        working-directory: extensions/${{ inputs.pack }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npm publish --access public
