apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-party
  description: Multi-persona collaboration session
  tier: 0
  family: collaborate

prerequisites:
  required: []

execution:
  spawns: [built-in]
  context: fresh
  parallel-spawns: [god-pm, god-architect, god-executor, god-quality-reviewer, god-harden-auditor, god-launch-strategist]
  writes:
    - .godpowers/party/*.mdx

success-path:
  next-recommended: /god-next

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-party
  events: [agent.start, agent.end]
