apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-next
  description: Suggest next command
  tier: 0
  family: continue
  trigger-precedence:
    - trigger: continue
      prefer: /god-resume-work
      when: handoff-exists
      fallback: /god-next
      reason: Resume a saved handoff before computing a fresh next route.

prerequisites:
  required:
    []

execution:
  spawns: [built-in]
  context: fresh
  reads:
    - .godpowers/prep/INITIAL-FINDINGS.mdx
    - .godpowers/prep/IMPORTED-CONTEXT.mdx
  writes:
    []


success-path:
  next-recommended: varies
  outcome:
    type: contextual
    label: Context-specific next route
    reason: The next route depends on current disk state, command arguments, or user choice.
    allowed-next: [/god-status, /god-next, /god-help]

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-next
  events: [agent.start, artifact.created, agent.end]
