apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-preflight
  description: Read-only intake audit before project-run readiness and pillars
  tier: 0
  family: start

prerequisites:
  required:
    - check: codebase-present
      human-required: true

execution:
  spawns: [god-auditor]
  context: fresh
  reads:
    - .godplans/PLAN.mdx
    - .godplans/validate-plan.sh
    - .godaudits/AUDIT.json
    - .godaudits/AUDIT.mdx
    - .godaudits/AUDIT.md
  writes:
    - .godpowers/preflight/PREFLIGHT.mdx

success-path:
  next-recommended: /god-archaeology
  alternatives:
    - command: /god-init
      when: missing-basic-project-state
    - command: /god-migrate
      when: sibling-plan-or-audit-detected
    - command: /god-reconstruct
      when: planning-artifacts-missing
    - command: /god-tech-debt
      when: debt-dominates-risk
    - command: /god-audit
      when: artifacts-exist

failure-path:
  on-error: /god-doctor

endoff:
  state-update: preflight completed
  events: [agent.start, artifact.created, agent.end]
