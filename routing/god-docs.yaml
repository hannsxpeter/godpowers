apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-docs
  description: Documentation work
  tier: 0
  family: maintain

prerequisites:
  required:
    []

execution:
  spawns: [god-docs-writer]
  context: fresh
  writes:
    - .godpowers/docs/UPDATE-LOG.mdx
    - README and docs

standards:
  substitution-test: true
  three-label-test: true
  have-nots: [DC-01, DC-02, DC-03, DC-04, DC-05]
  gate-on-failure: pause-for-user

success-path:
  next-recommended: /god-status

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-docs
  events: [agent.start, artifact.created, agent.end, linkage.snapshot, drift.detected, review-required.populated]
