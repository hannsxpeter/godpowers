apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-stack
  description: Pick technology stack
  tier: 1
  family: start

prerequisites:
  required:
    - check: state:tier-1.arch.status == done
      auto-complete: /god-arch
      human-required: true

execution:
  spawns: [god-stack-selector]
  context: fresh
  reads:
    - .godpowers/arch/ARCH.md
    - .godpowers/design/DESIGN.md
    - .godpowers/design/PRODUCT.md
    - .godpowers/prep/INITIAL-FINDINGS.md
    - .godpowers/prep/IMPORTED-CONTEXT.md
  writes:
    - .godpowers/stack/DECISION.md

standards:
  substitution-test: true
  three-label-test: true
  have-nots: [S-01, S-02, S-03, S-04, S-05]
  gate-on-failure: pause-for-user
  gate-command: npx godpowers gate --tier=stack --project=.

success-path:
  next-recommended: /god-repo
  conditional-next:
    - condition: ui-detected
      next: /god-design
      reason: UI framework selected; design tokens needed before scaffolding
    - condition: no-ui-detected
      next: /god-repo
      reason: Backend-only project; skip design tier

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-1 updated for /god-stack
  events: [agent.start, artifact.created, design.required-detected, agent.end]
