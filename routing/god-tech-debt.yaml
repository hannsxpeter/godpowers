apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-tech-debt
  description: Assess and prioritize technical debt
  tier: 0
  family: maintain

prerequisites:
  required: []

execution:
  spawns: [god-debt-assessor]
  context: fresh
  writes:
    - .godpowers/tech-debt/REPORT.mdx

success-path:
  next-recommended: /god-status
  alternatives:
    - command: /god-hotfix
      when: p0-security-debt-found
    - command: /god-update-deps
      when: dependency-debt-dominant
    - command: /god-upgrade
      when: major-migration-needed

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tech-debt assessment completed
  events: [agent.start, artifact.created, agent.end]
