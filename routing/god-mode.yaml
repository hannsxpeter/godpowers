apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-mode
  description: Full autonomous project run
  tier: 0
  family: start

prerequisites:
  required:
    - check: state:initialized == true OR mode-A-greenfield
      auto-complete: /god-init
      human-required: true
    - check: safe-sync-clear
      auto-complete: /god-reconcile Release Truth And Safe Sync
      human-required: true

execution:
  spawns: [god-orchestrator]
  context: fresh
  reads:
    - .godpowers/prep/INITIAL-FINDINGS.mdx
    - .godpowers/prep/IMPORTED-CONTEXT.mdx
    - .godpowers/preflight/PREFLIGHT.mdx
    - .godplans/PLAN.mdx
    - .godplans/validate-plan.sh
    - .godaudits/AUDIT.json
    - .godaudits/AUDIT.mdx
    - .godaudits/AUDIT.md
  secondary-spawns: [god-auditor, god-pm, god-designer, god-architect, god-roadmapper, god-stack-selector, god-repo-scaffolder, god-planner, god-executor, god-spec-reviewer, god-quality-reviewer, god-deploy-engineer, god-observability-engineer, god-harden-auditor, god-launch-strategist]
  writes:
    []


success-path:
  next-recommended: steady-state
  outcome:
    type: steady-state
    label: Steady state
    reason: The project run has completed and ongoing work should start from steady-state commands.
    allowed-next: [/god-status, /god-feature, /god-hygiene]

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-mode
  events: [agent.start, artifact.created, agent.end]
  lifecycle-transition: pre-init/in-arc -> steady-state-active
