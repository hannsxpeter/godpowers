apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-test-runtime
  description: Headless browser runtime verification
  tier: 3
  family: verify

prerequisites:
  required:
    - .godpowers/design/DESIGN.mdx

execution:
  spawns: [god-browser-tester]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-launch

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-3 updated for /god-test-runtime
  events: [agent.start, agent.end]
