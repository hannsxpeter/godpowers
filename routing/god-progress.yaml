apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-progress
  description: Deliverable progress at the requirement and increment level
  tier: 0
  family: continue
  trigger-precedence:
    - trigger: what's done
      prefer: /god-status
      when: operational-status-request
      fallback: /god-progress
      reason: Operational state goes to status while deliverable completion stays in progress.

prerequisites:
  required:
    []

execution:
  spawns: [built-in]
  context: fresh
  writes:
    - .godpowers/REQUIREMENTS.mdx


success-path:
  next-recommended: /god-next

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-progress
  events: [agent.start, artifact.created, agent.end]
