apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-spike
  description: Time-boxed research
  tier: 0
  family: build

prerequisites:
  required:
    []

execution:
  spawns: [god-spike-runner]
  context: fresh
  writes:
    - .godpowers/spikes/<slug>/SPIKE.mdx

standards:
  substitution-test: true
  three-label-test: true
  have-nots: [SP-01, SP-02, SP-03, SP-04, SP-05]
  gate-on-failure: pause-for-user

success-path:
  next-recommended: /god-feature
  alternatives:
    - command: /god-spike
      when: inconclusive-needs-narrower-question

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-spike
  events: [agent.start, artifact.created, agent.end, linkage.snapshot, drift.detected, review-required.populated]
