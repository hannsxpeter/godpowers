apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-context
  description: Manage Godpowers fence in AGENTS.md / CLAUDE.md / GEMINI.md / others
  tier: 0
  family: maintain

prerequisites:
  required:
    - check: state:initialized == true
      reason: "/god-context needs an initialized project"
      auto-complete: /god-init

execution:
  spawns: [god-context-writer]
  context: fresh
  writes:
    - AGENTS.md
    - CLAUDE.md
    - GEMINI.md
    - .cursor/rules/godpowers.mdc
    - .cursorrules
    - .windsurf/rules/godpowers.md
    - .windsurfrules
    - .github/copilot-instructions.md
    - .clinerules
    - .roo/rules/godpowers.md
    - .continue/rules/godpowers.md

standards:
  have-nots:
    - "fence content exceeds 30 lines"
    - "fence contains secrets or credentials"
    - "fence content overwrites user content outside fence"

success-path:
  next-recommended: /god-status

failure-path:
  on-error: /god-doctor

endoff:
  state-update: project.context-prompt-answered persisted
  events: [agent.start, artifact.created, artifact.updated, agent.end]
