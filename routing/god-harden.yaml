apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-harden
  description: Adversarial security review
  tier: 3
  family: operate

prerequisites:
  required:
    - check: state:tier-2.build.status == done
      auto-complete: /god-build
      human-required: true
    - check: safe-sync-clear
      auto-complete: /god-reconcile Release Truth And Safe Sync
      human-required: true

execution:
  spawns: [god-harden-auditor]
  context: fresh
  writes:
    - .godpowers/harden/FINDINGS.mdx
  blocks-on:
    - critical-finding: pause-required
  parallel-spawns:
    - condition: ui-detected
      agent: god-browser-tester
      mode: a11y-only
      reason: real-DOM accessibility audit alongside security harden

standards:
  substitution-test: true
  three-label-test: true
  have-nots: [H-01, H-02, H-03, H-04, H-05, H-06, H-07, H-08, H-09, H-10, H-11]
  gate-on-failure: pause-for-user
  gate-command: npx godpowers gate --tier=harden --project=.

success-path:
  next-recommended: /god-launch

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-3 updated for /god-harden
  events: [agent.start, artifact.created, agent.end, linkage.snapshot, drift.detected, review-required.populated, runtime.audit-complete, runtime.test-complete]
