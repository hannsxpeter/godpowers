apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-update-deps
  description: Audit and update dependencies
  tier: 0
  family: maintain

prerequisites:
  required:
    - check: state:tier-2.repo.status == done

execution:
  spawns: [god-deps-auditor]
  context: fresh
  secondary-spawns: [god-executor, god-quality-reviewer]
  writes:
    - .godpowers/deps/AUDIT.mdx

standards:
  substitution-test: true
  three-label-test: true
  have-nots: [DP-01, DP-02, DP-03, DP-04, DP-05, DP-06]
  gate-on-failure: pause-for-user

success-path:
  next-recommended: /god-upgrade
  alternatives:
    - command: /god-status
      when: no-major-bumps

  post-success-actions:
    - run: /god-scan
      reason: refresh linkage map; surface drift to REVIEW-REQUIRED.md
failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-update-deps
  events: [agent.start, artifact.created, agent.end, linkage.snapshot, drift.detected, review-required.populated]
