apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-design
  description: Design lifecycle (DESIGN.md + PRODUCT.md) bridged to impeccable
  tier: 1
  family: start

prerequisites:
  required:
    - check: state:initialized == true
      reason: "/god-design needs an initialized project"
      auto-complete: /god-init
    - check: file:.godpowers/prd/PRD.md
      reason: "Design needs PRD user, product, and register context"
      auto-complete: /god-prd
  optional:
    - check: file:.godpowers/prep/INITIAL-FINDINGS.md
      reason: "Initial findings can show UI and product-experience signals"
    - check: file:.godpowers/prep/IMPORTED-CONTEXT.md
      reason: "Imported legacy planning, Superpowers, or BMAD context can inform design hypotheses"
    - check: file:.godpowers/arch/ARCH.md
      reason: "ARCH names the UI surface that DESIGN applies to"
    - check: file:.godpowers/stack/DECISION.md
      reason: "STACK can refine framework-specific token shape when already selected"

execution:
  spawns: [god-designer]
  secondary-spawns: [god-design-reviewer]
  context: fresh
  conditional:
    - condition: ui-detected
      run: spawn-designer
    - condition: no-ui-detected
      run: skip-with-status-not-required

  writes:
    - DESIGN.md
    - PRODUCT.md
    - .godpowers/design/STATE.md

standards:
  have-nots:
    - D-NAME           # frontmatter name required
    - D-CONTRAST       # WCAG AA on text/background components
    - D-TOKEN-REF      # all {token.refs} resolve
    - D-SECTION-ORDER  # canonical section order
    - D-SECTION-DUP    # no duplicate sections
    - "impeccable-critical" # if impeccable installed, no critical findings
    - "purple-blue gradients" # impeccable anti-pattern
    - "Inter everywhere"      # impeccable anti-pattern
    - "cards in cards"        # impeccable anti-pattern
  gate-command: npx godpowers gate --tier=design --project=.

success-path:
  next-recommended: /god-arch
  why: Early product experience is defined; architecture can now respect the intended surfaces and flows
  alternatives:
    - command: /god-repo
      when: architecture-roadmap-and-stack-already-done

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-1.design.status = done; tier-1.product.status = done (if impeccable)
  events:
    - agent.start
    - design.required-detected
    - impeccable.dispatch
    - impeccable.findings
    - design.review-verdict
    - design.lint-result
    - artifact.created
    - artifact.updated
    - agent.end
