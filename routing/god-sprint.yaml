apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-sprint
  description: Sprint plan / status / retro
  tier: 0
  family: collaborate

prerequisites:
  required:
    - .godpowers/roadmap/ROADMAP.mdx

execution:
  spawns: [god-retrospective]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-feature or /god-story
  outcome:
    type: requires-selection
    label: User selection required
    reason: The route offers multiple valid next commands and the user should choose one.
    allowed-next: [/god-feature, /god-story]

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-sprint
  events: [agent.start, agent.end]
