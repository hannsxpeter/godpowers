apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-story-build
  description: Implement a single story
  tier: 2
  family: build

prerequisites:
  required:
    - .godpowers/stories/STORY-*.mdx

execution:
  spawns: [god-planner]
  context: fresh
  secondary-spawns: [god-executor, god-spec-reviewer, god-quality-reviewer]
  writes:
    - .godpowers/stories/STORY-*.mdx
    - source code

standards:
  substitution-test: true
  three-label-test: true
  have-nots: [B-01, B-02, B-03, B-04, B-05, B-06, B-07, B-08, B-09, B-10, B-11, B-12]
  gate-on-failure: pause-for-user

success-path:
  next-recommended: /god-story-verify

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-2 updated for /god-story-build
  events: [agent.start, agent.end]
