apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-resume-work
  description: Restore from handoff
  tier: 0
  family: continue

prerequisites:
  required:
    - check: file:.godpowers/HANDOFF.mdx

execution:
  spawns: [built-in]
  context: fresh
  writes:
    []


success-path:
  next-recommended: varies
  outcome:
    type: contextual
    label: Context-specific next route
    reason: The next route depends on current disk state, command arguments, or user choice.
    allowed-next: [/god-status, /god-next, /god-help]

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-resume-work
  events: [agent.start, artifact.created, agent.end]
