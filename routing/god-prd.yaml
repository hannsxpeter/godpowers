apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-prd
  description: Write a Product Requirements Document
  tier: 1
  family: start

prerequisites:
  required:
    - check: state:initialized == true
      auto-complete: /god-init
      human-required: true
  recommended:
    - command: /god-explore
      when: user-intent-is-vague
    - command: /god-discuss
      when: scope-needs-clarification

execution:
  spawns: [god-pm]
  context: fresh
  reads:
    - .godpowers/intent.yaml
    - .godpowers/prep/INITIAL-FINDINGS.md
    - .godpowers/prep/IMPORTED-CONTEXT.md
    - templates/PRD.md
  writes:
    - .godpowers/prd/PRD.md
    - .godpowers/prd/PRD.meta.json
  secondary-spawns: [god-auditor]  # for verification

standards:
  substitution-test: true
  three-label-test: true
  have-nots: [P-01, P-02, P-03, P-04, P-05, P-06, P-07, P-08, P-09, P-10, P-11, P-12, P-13, P-14, P-15]
  gate-on-failure: pause-for-user
  gate-command: npx godpowers gate --tier=prd --project=.

success-path:
  next-recommended: /god-arch
  conditional-next:
    - condition: ui-detected
      next: /god-design
      reason: UI or product-experience signals found; write DESIGN.md before architecture
    - condition: no-ui-detected
      next: /god-arch
      reason: No UI surface detected; architecture is the next planning gate
  alternatives:
    - command: /god-mode
      when: user-wants-autonomous-from-here

failure-path:
  on-have-nots-fail: /god-prd
  on-pause: relay-to-user-with-options
  on-error: /god-doctor

endoff:
  state-update: tier-1.prd.status = done
  events: [agent.start, artifact.created, have-nots.check, agent.end]
