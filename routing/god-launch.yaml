apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-launch
  description: Launch the product
  tier: 3
  family: operate

prerequisites:
  required:
    - check: state:tier-3.harden.status == done
      auto-complete: /god-harden
      human-required: true
    - check: safe-sync-clear
      auto-complete: /god-reconcile Release Truth And Safe Sync
      human-required: true
    - check: no-critical-findings
      auto-complete: /god-harden
      human-required: true

execution:
  spawns: [god-launch-strategist]
  context: fresh
  writes:
    - .godpowers/state.json
    - .godpowers/launch/PREPUBLICATION.mdx
    - landing copy
    - OG cards
    - launch runbook

standards:
  substitution-test: true
  three-label-test: true
  have-nots: [L-01, L-02, L-03, L-04, L-05, L-06, L-07, L-08]
  gate-on-failure: pause-for-user

success-path:
  next-recommended: steady-state
  outcome:
    type: steady-state
    label: Steady state
    reason: The project run has completed and ongoing work should start from steady-state commands.
    allowed-next: [/god-status, /god-feature, /god-hygiene]

  post-success-actions:
    - run: /god-scan
      reason: refresh linkage map; surface drift to REVIEW-REQUIRED.md
failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-3 updated for /god-launch
  events: [agent.start, artifact.created, agent.end, linkage.snapshot, drift.detected, review-required.populated]
  lifecycle-transition: in-arc -> steady-state-active
