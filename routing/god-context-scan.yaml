apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-context-scan
  description: 
  tier: 0
  family: maintain

prerequisites:
  required: []

execution:
  spawns: [built-in]
  context: fresh
  reads:
    - .godpowers/state.json
    - .godplans/PLAN.mdx
    - .godplans/validate-plan.sh
    - .godaudits/AUDIT.json
    - .godaudits/AUDIT.mdx
    - .godaudits/AUDIT.md
  writes: []

success-path:
  next-recommended: varies
  outcome:
    type: contextual
    label: Context-specific next route
    reason: The next route depends on current disk state, command arguments, or user choice.
    allowed-next: [/god-status, /god-next, /god-help]

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0
  events: [agent.start, agent.end]
