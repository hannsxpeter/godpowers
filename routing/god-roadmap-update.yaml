apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-roadmap-update
  description: Update ROADMAP.mdx after feature work or priority changes
  tier: 1
  family: maintain

prerequisites:
  required:
    - check: file:.godpowers/roadmap/ROADMAP.mdx
      auto-complete: /god-roadmap
      human-required: true

execution:
  spawns: [god-roadmap-updater]
  context: fresh
  reads:
    - .godpowers/roadmap/ROADMAP.mdx
    - .godpowers/prd/PRD.mdx
  writes:
    - .godpowers/roadmap/ROADMAP.mdx
    - Roadmap Changelog section appended

standards:
  have-nots: [R-01, R-02, R-03, R-04, R-05, R-06, R-07]
  gate-on-failure: pause-for-user

success-path:
  next-recommended: /god-status

failure-path:
  on-have-nots-fail: /god-roadmap-update
  on-error: /god-doctor

endoff:
  state-update: tier-1.roadmap.updated timestamp
  events: [agent.start, artifact.updated, have-nots.check, agent.end]
