apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-feature
  description: Add feature to existing project
  tier: 0
  family: build

prerequisites:
  required:
    - check: state:lifecycle-phase == steady-state-active OR state:tier-1.arch.status == done
      auto-complete: /god-init
      human-required: true

execution:
  spawns: [god-pm]
  context: fresh
  secondary-spawns: [god-architect, god-planner, god-executor, god-spec-reviewer, god-quality-reviewer, god-harden-auditor, god-launch-strategist]
  writes:
    - .godpowers/features/<slug>/PRD.mdx
    - feature code


success-path:
  next-recommended: /god-status

  post-success-actions:
    - run: /god-scan
      reason: refresh linkage map; surface drift to REVIEW-REQUIRED.md
failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-feature
  events: [agent.start, artifact.created, agent.end, linkage.snapshot, drift.detected, review-required.populated]
