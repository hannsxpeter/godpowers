apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-repo
  description: Scaffold the repository
  tier: 2
  family: start

prerequisites:
  required:
    - check: state:tier-1.stack.status == done
      auto-complete: /god-stack
      human-required: true

execution:
  spawns: [god-repo-scaffolder]
  context: fresh
  writes:
    - .godpowers/repo/AUDIT.md
    - repo source files

standards:
  substitution-test: true
  three-label-test: true
  have-nots: [RP-01, RP-02, RP-03, RP-04, RP-05, RP-06, RP-07, RP-08]
  gate-on-failure: pause-for-user
  gate-command: npx godpowers gate --tier=repo --project=.

success-path:
  next-recommended: /god-build

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-2 updated for /god-repo
  events: [agent.start, artifact.created, agent.end]
