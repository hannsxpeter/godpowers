apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: brownfield-onboarding
  category: starting
  description: "Inheriting an existing codebase; preflight before archaeology"

triggers:
  intent-keywords:
    - "brownfield"
    - "inherit codebase"
    - "legacy code"
    - "understand existing"
    - "audit an existing repo"
    - "audit existing repo"
    - "audit existing codebase"
    - "godplans"
    - "godaudits"
    - "import the plan"
    - "import the audit"
    - "import the master plan"
  state-conditions:
    - "has-package-json"

sequences:
  default:
    description: "Inheriting an existing codebase; preflight before archaeology"
    steps:
      - command: "/god-preflight"
        why: "Read-only intake audit before project-run readiness and pillars"
      - command: "/god-archaeology"
        why: "Deep history, decisions, conventions, risks"
      - command: "/god-reconstruct"
        why: "Reverse-engineer PRD/ARCH/ROADMAP/STACK from code"
      - command: "/god-audit"
        why: "Score reconstructed artifacts"
      - command: "/god-tech-debt"
        why: "Categorize and prioritize debt"
      - command: "/god-feature"
        why: "Now safe to add new work with reconciliation"

default-sequence: default
