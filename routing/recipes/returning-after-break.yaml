apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: returning-after-break
  category: starting
  description: "Returning to a project after a long break"

triggers:
  intent-keywords:
    - "returning"
    - "after break"
    - "pick up where left"
    - "resume project"
    - "coming back after a week"
    - "back after a week"
    - "coming back"
  state-conditions:
    - "state:initialized == true"

sequences:
  default:
    description: "Returning to a project after a long break"
    steps:
      - command: "/god-resume-work"
        why: "If HANDOFF.md exists, restore context"
        skip-when: no-handoff
      - command: "/god-status"
        why: "Current state from disk"
      - command: "/god-hygiene"
        why: "Check what may have drifted"
      - command: "/god-next"
        why: "Pick up where you left off"

default-sequence: default
