apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: pause-handoff
  category: collaborating
  description: "Pause work, hand off to teammate"

triggers:
  intent-keywords:
    - "hand off"
    - "teammate takes over"
    - "pause for someone"

sequences:
  default:
    description: "Pause work, hand off to teammate"
    steps:
      - command: "/god-pause-work"
        why: "Save HANDOFF.mdx with context"

default-sequence: default
