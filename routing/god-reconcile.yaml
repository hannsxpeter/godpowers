apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-reconcile
  description: Multi-artifact reconciliation across PRD/ARCH/ROADMAP/STACK/etc.
  tier: 0
  family: maintain

prerequisites:
  required:
    - check: state:initialized == true
      auto-complete: /god-init
      human-required: true

execution:
  spawns: [god-reconciler]
  context: fresh
  reads:
    - .godpowers/prd/PRD.mdx
    - .godpowers/arch/ARCH.mdx
    - .godpowers/roadmap/ROADMAP.mdx
    - .godpowers/stack/DECISION.mdx
    - .godpowers/repo/AUDIT.mdx
    - .godpowers/state.json
    - .godpowers/harden/FINDINGS.mdx
    - .godpowers/backlog/BACKLOG.mdx
    - .godpowers/seeds/
    - .godpowers/todos/TODOS.mdx
    - .godpowers/threads/
    - .godplans/PLAN.mdx
    - .godaudits/AUDIT.json
    - .godaudits/AUDIT.mdx
    - .godaudits/AUDIT.md

success-path:
  next-recommended: varies-by-verdict
  outcome:
    type: verdict-based
    label: Verdict-based next route
    reason: The next route depends on the returned verdict.
    allowed-next: [/god-status, /god-next, /god-discuss]
  alternatives:
    - command: /god-feature
      when: status-is-enhancement-or-new
    - command: /god-add-backlog
      when: status-is-prerequisite-needed
    - command: /god-status
      when: status-is-already-done

failure-path:
  on-error: /god-doctor

endoff:
  state-update: no direct state update; verdict drives next command
  events: [agent.start, agent.end, decision.route]
