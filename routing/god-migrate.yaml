apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-migrate
  description: Detect and migrate legacy planning, BMAD, Superpowers, Arc-Ready, godplans, and godaudits planning context
  tier: 0
  family: start

prerequisites:
  required: []
  recommended:
    - command: /god-init
      when: .godpowers-state-missing

execution:
  spawns: []
  context: current
  reads:
    - .planning/**
    - .legacy-planning/**
    - _bmad-output/**
    - .bmad/**
    - docs/superpowers/**
    - .arc-ready/**
    - .prd-ready/**
    - .architecture-ready/**
    - .roadmap-ready/**
    - .stack-ready/**
    - .repo-ready/**
    - .production-ready/**
    - .deploy-ready/**
    - .observe-ready/**
    - .launch-ready/**
    - .harden-ready/**
    - .godplans/**
    - .godaudits/AUDIT.json
    - .godaudits/AUDIT.mdx
    - .godaudits/AUDIT.md
  writes:
    - .godpowers/prep/IMPORTED-CONTEXT.mdx
    - .godpowers/prd/PRD.mdx
    - .godpowers/arch/ARCH.mdx
    - .godpowers/roadmap/ROADMAP.mdx
    - .godpowers/stack/DECISION.mdx
    - .godpowers/todos/TODOS.mdx
    - .godpowers/state.json
    - .planning/GODPOWERS-SYNC.md
    - .legacy-planning/GODPOWERS-SYNC.md
    - _bmad-output/GODPOWERS-SYNC.md
    - .bmad/GODPOWERS-SYNC.md
    - docs/superpowers/GODPOWERS-SYNC.md
    - .arc-ready/GODPOWERS-SYNC.md
    - .godplans/GODPOWERS-SYNC.mdx
    - .godaudits/GODPOWERS-SYNC.mdx
  local-runtime:
    - lib/planning-systems.importPlanningContext
    - lib/source-sync.run
  conditional-spawns:
    - agent: god-greenfieldifier
      when: low-confidence-or-conflicting-import

standards:
  gate-on-failure: pause-for-user

success-path:
  next-recommended: /god-audit
  alternatives:
    - command: /god-prd
      when: imported-prd-seed-needs-hardening
    - command: /god-roadmap
      when: imported-roadmap-seed-needs-hardening
    - command: /god-sync
      when: user-only-wants-sync-back

failure-path:
  on-error: /god-doctor

endoff:
  state-update: source-systems imported and sync-back timestamps updated
  events: [migration.detected, artifact.imported, source-sync.updated]
