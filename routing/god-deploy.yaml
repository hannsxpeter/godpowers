apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-deploy
  description: Set up deploy pipeline
  tier: 3
  family: operate

prerequisites:
  required:
    - check: state:tier-2.build.status == done
      auto-complete: /god-build
      human-required: true
    - check: safe-sync-clear
      auto-complete: /god-reconcile Release Truth And Safe Sync
      human-required: true

execution:
  spawns: [god-deploy-engineer]
  context: fresh
  writes:
    - .godpowers/state.json
    - deploy config
    - .godpowers/deploy/WAITING-FOR-EXTERNAL-ACCESS.mdx when needed

standards:
  substitution-test: true
  three-label-test: true
  have-nots: [D-01, D-02, D-03, D-04, D-05, D-06, D-07, D-08]
  gate-on-failure: pause-for-user

success-path:
  next-recommended: /god-observe

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-3 updated for /god-deploy
  events: [agent.start, artifact.created, agent.end]
