# STATUS: Authoritative (v0.14+). Read by lib/workflow-runner.js for plan
# computation. The orchestrator agent (agents/god-orchestrator.md) dispatches
# the agents in the order this file specifies. To preview without running,
# use `/god-mode --workflow=<name> --plan`.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: bluefield-arc
  version: 1.3.0
  description: |
    Bluefield: new code, existing org context. Loads org standards first,
    runs a preflight intake against the surrounding environment, runs a
    greenfield simulation audit against those constraints, then runs a
    user-approved greenfieldification pass before the full project run.

on: [/god-mode --bluefield]

jobs:
  org-context:
    tier: 0
    uses: god-org-context-loader@^1.0.0

  preflight:
    tier: 0
    needs: org-context
    uses: god-auditor@^1.0.0
    with:
      mode: preflight
      scope: org-context-and-surrounding-repo
      output: .godpowers/preflight/PREFLIGHT.mdx

  greenfield-simulation-audit:
    tier: 0
    needs: preflight
    uses: god-auditor@^1.0.0
    with:
      mode: greenfield-simulation
      compare: canonical-godpowers-arc-to-org-constraints
      output: .godpowers/audit/GREENFIELD-SIMULATION.mdx

  greenfieldify-artifacts:
    tier: 0
    needs: greenfield-simulation-audit
    uses: god-greenfieldifier@^1.0.0
    with:
      mode: bluefield
      audit: .godpowers/audit/GREENFIELD-SIMULATION.mdx
      plan: .godpowers/audit/GREENFIELDIFY-PLAN.mdx
      approval: required-before-writing-canonical-artifacts
      artifacts:
        - .godpowers/prd/PRD.mdx
        - .godpowers/design/DESIGN.mdx
        - .godpowers/product/PRODUCT.mdx
        - .godpowers/arch/ARCH.mdx
        - .godpowers/roadmap/ROADMAP.mdx
        - .godpowers/stack/DECISION.mdx
        - .godpowers/repo/AUDIT.mdx
        - .godpowers/state.json
        - .godpowers/build/PLAN.mdx
        - .godpowers/harden/FINDINGS.mdx

  prd:
    tier: 1
    needs: greenfieldify-artifacts
    uses: god-pm@^1.0.0
    with:
      routing-order: [product-form, product-archetype, industry, regulatory]

  arch:
    tier: 1
    needs: prd
    uses: god-architect@^1.0.0
    with:
      respect-org-context: true

  roadmap:
    tier: 1
    needs: arch
    uses: god-roadmapper@^1.0.0

  stack:
    tier: 1
    needs: arch
    uses: god-stack-selector@^1.0.0
    with:
      respect-org-context: true
      domain-composition: primary-profile-then-secondary-hard-constraints

  repo:
    tier: 2
    needs: stack
    uses: god-repo-scaffolder@^1.0.0

  build:
    tier: 2
    needs: [roadmap, repo]
    uses: god-planner@^1.0.0
    with:
      completion-gate: selected-product-form
    review:
      stages:
        - uses: god-spec-reviewer@^1.0.0
        - uses: god-quality-reviewer@^1.0.0
    on-pass: commit-atomic

  deploy:
    tier: 3
    needs: build
    uses: god-deploy-engineer@^1.0.0
    with:
      use-org-platform: true

  observe:
    tier: 3
    needs: deploy
    uses: god-observability-engineer@^1.0.0
    with:
      use-org-stack: true

  harden:
    tier: 3
    needs: build
    uses: god-harden-auditor@^1.0.0
    with:
      check-org-security-standards: true
    blocks-on:
      - critical-finding: pause

  launch:
    tier: 3
    needs: harden
    uses: god-launch-strategist@^1.0.0

  final-sync:
    tier: 0
    needs: launch
    uses: god-orchestrator@^1.0.0
    local-helper-groups:
      - runtime-awareness-closeout
      - standard-closeout
    with:
      action: final-sync
      dashboard: action-brief
