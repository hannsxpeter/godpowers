# STATUS: Authoritative (v0.14+). Read by lib/workflow-runner.js for plan
# computation. The orchestrator agent (agents/god-orchestrator.md) dispatches
# the agents in the order this file specifies. To preview without running,
# use `/god-mode --workflow=<name> --plan`.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: brownfield-arc
  version: 1.3.0
  description: |
    Brownfield: existing codebase, inspect before prescribing. Preflight +
    archaeology + reconstruction + debt assessment + greenfield simulation
    audit, then a user-approved greenfieldification pass before normal project-run
    workflows.

on: [/god-mode --brownfield]

jobs:
  preflight:
    tier: 0
    uses: god-auditor@^1.0.0
    with:
      mode: preflight
      output: .godpowers/preflight/PREFLIGHT.mdx

  archaeology:
    tier: 0
    needs: preflight
    uses: god-archaeologist@^1.0.0

  # Local runtime call: lib/planning-systems.importPlanningContext. Imports
  # sibling godplans/godaudits artifacts (and legacy planning systems) into
  # prep context and seed artifacts before reconstruction runs. PLAN.mdx and
  # AUDIT.mdx stay read-only; parsing via lib/sibling-artifacts.js.
  import-sibling-artifacts:
    tier: 0
    needs: preflight
    uses: god-orchestrator@^1.0.0
    local-helpers:
      - sibling-artifact-import
    with:
      action: import-sibling-artifacts

  reconstruct:
    tier: 1
    needs: [archaeology, import-sibling-artifacts]
    uses: god-reconstructor@^1.0.0
    with:
      prefer-imported-plan: .godplans/PLAN.mdx

  debt-assess:
    tier: 0
    needs: archaeology
    uses: god-debt-assessor@^1.0.0

  audit:
    tier: 0
    needs: [reconstruct, debt-assess]
    uses: god-auditor@^1.0.0
    with:
      mode: full-audit-on-reconstructed

  greenfield-simulation-audit:
    tier: 0
    needs: audit
    uses: god-auditor@^1.0.0
    with:
      mode: greenfield-simulation
      compare: existing-codebase-to-canonical-godpowers-arc
      compare-inputs:
        - .godplans/PLAN.mdx
        - .godaudits/AUDIT.mdx
      output: .godpowers/audit/GREENFIELD-SIMULATION.mdx

  greenfieldify-artifacts:
    tier: 0
    needs: greenfield-simulation-audit
    uses: god-greenfieldifier@^1.0.0
    with:
      mode: brownfield
      audit: .godpowers/audit/GREENFIELD-SIMULATION.mdx
      plan: .godpowers/audit/GREENFIELDIFY-PLAN.mdx
      approval: required-before-writing-canonical-artifacts
      artifacts:
        - .godpowers/prd/PRD.mdx
        - .godpowers/design/DESIGN.mdx
        - .godpowers/product/PRODUCT.mdx
        - .godpowers/arch/ARCH.mdx
        - .godpowers/roadmap/ROADMAP.mdx
        - .godpowers/stack/DECISION.mdx
        - .godpowers/repo/AUDIT.mdx
        - .godpowers/state.json
        - .godpowers/build/PLAN.mdx
        - .godpowers/harden/FINDINGS.mdx

  steady-state-handoff:
    tier: 0
    needs: greenfieldify-artifacts
    uses: god-orchestrator@^1.0.0
    with:
      action: brownfield-to-steady

  final-sync:
    tier: 0
    needs: steady-state-handoff
    uses: god-orchestrator@^1.0.0
    local-helper-groups:
      - runtime-awareness-closeout
      - source-sync-closeout
      - standard-closeout
    with:
      action: final-sync
      dashboard: action-brief
