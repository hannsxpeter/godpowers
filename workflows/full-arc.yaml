# STATUS: Authoritative (v0.14+). Read by lib/workflow-runner.js for plan
# computation. The orchestrator agent (agents/god-orchestrator.md) dispatches
# the agents in the order this file specifies. To preview without running,
# use `/god-mode --workflow=<name> --plan`.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: full-arc
  version: 1.0.0
  description: |
    Idea to hardened production. The default greenfield workflow.
    Run by /god-mode.

on: [/god-mode]

jobs:
  prd:
    tier: 1
    uses: god-pm@^1.0.0
    with:
      template: PRD.md

  arch:
    tier: 1
    needs: prd
    uses: god-architect@^1.0.0
    with:
      template: ARCH.md

  roadmap:
    tier: 1
    needs: arch
    uses: god-roadmapper@^1.0.0
    with:
      template: ROADMAP.md

  stack:
    tier: 1
    needs: arch
    uses: god-stack-selector@^1.0.0
    with:
      template: STACK-DECISION.md

  repo:
    tier: 2
    needs: stack
    uses: god-repo-scaffolder@^1.0.0

  build:
    tier: 2
    needs: [roadmap, repo]
    uses: god-planner@^1.0.0
    review:
      stages:
        - uses: god-spec-reviewer@^1.0.0
          on-fail: rollback
        - uses: god-quality-reviewer@^1.0.0
          on-fail: rollback
    on-pass: commit-atomic
    on-fail: repair-loop
    verification:
      required: [test, lint, typecheck-or-check]

  code-audit:
    tier: 2
    needs: build
    uses: god-debt-assessor@^1.0.0
    with:
      mode: post-build-audit

  deploy:
    tier: 3
    needs: code-audit
    uses: god-deploy-engineer@^1.0.0
    closure:
      on-missing-external-access: create-waiting-access-bundle
      local-verification-required: true
      access-order: ask-for-staging-url-before-provider-keys
      max-new-access-items-per-pause: 1
      origin-evidence-required: true
      no-inferred-domains: true

  observe:
    tier: 3
    needs: deploy
    uses: god-observability-engineer@^1.0.0
    closure:
      access-order: ask-for-local-definitions-before-provider-keys
      max-new-access-items-per-pause: 1

  harden:
    tier: 3
    needs: code-audit
    uses: god-harden-auditor@^1.0.0
    blocks-on:
      - critical-finding: pause

  launch:
    tier: 3
    needs: harden
    uses: god-launch-strategist@^1.0.0
    with:
      template: HARDEN-FINDINGS.md
    closure:
      no-broad-checklists: true
      on-missing-external-access: pause-with-single-access-bundle
      access-order: ask-for-staging-url-before-provider-keys
      max-new-access-items-per-pause: 1
      origin-evidence-required: true
      no-inferred-domains: true

  final-sync:
    tier: 0
    needs: launch
    uses: god-orchestrator@^1.0.0
    local-helper-groups:
      - runtime-awareness-closeout
      - source-sync-closeout
      - standard-closeout
      - release-readiness-closeout
    with:
      action: final-sync
      dashboard: action-brief
