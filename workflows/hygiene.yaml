# STATUS: Authoritative (v0.14+). Read by lib/workflow-runner.js for plan
# computation. The orchestrator agent (agents/god-orchestrator.md) dispatches
# the agents in the order this file specifies. To preview without running,
# use `/god-mode --workflow=<name> --plan`.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: hygiene
  version: 1.0.0
  description: |
    Composite health check: artifact audit + dependency audit + docs verification.
    Periodic check for steady-state projects.
    Run by /god-hygiene.

on: [/god-hygiene]

jobs:
  hygiene-audit:
    tier: 0
    uses: god-auditor@^1.0.0
    with:
      mode: full-audit

  hygiene-deps:
    tier: 0
    uses: god-deps-auditor@^1.0.0
    with:
      mode: audit-only

  hygiene-docs:
    tier: 0
    uses: god-docs-writer@^1.0.0
    with:
      mode: verify-only

  hygiene-report:
    tier: 0
    needs: [hygiene-audit, hygiene-deps, hygiene-docs]
    uses: god-orchestrator@^1.0.0
    local-helper-groups:
      - repo-maintenance-closeout
    local-helpers:
      - host-capabilities
      - checkpoint-sync
    with:
      action: compose-hygiene-report
      output: .godpowers/HYGIENE-REPORT.mdx
      dashboard: action-brief
