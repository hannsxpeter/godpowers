# STATUS: Authoritative (v0.14+). Read by lib/workflow-runner.js for plan
# computation. The orchestrator agent (agents/god-orchestrator.md) dispatches
# the agents in the order this file specifies. To preview without running,
# use `/god-mode --workflow=<name> --plan`.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: feature-arc
  version: 1.0.0
  description: |
    Add a feature to an existing project. Skips full project-run setup.
    Run by /god-feature.

on: [/god-feature]

jobs:
  feature-prd:
    tier: 1
    uses: god-pm@^1.0.0
    with:
      mode: feature-only
      template: PRD.md
      routing-order: [product-form, product-archetype, industry, regulatory]

  feature-arch:
    tier: 1
    needs: feature-prd
    uses: god-architect@^1.0.0
    with:
      mode: delta-only
    skip-when: existing-arch-covers-feature

  feature-build:
    tier: 2
    needs: feature-prd
    uses: god-planner@^1.0.0
    with:
      completion-gate: selected-product-form
    review:
      stages:
        - uses: god-spec-reviewer@^1.0.0
          on-fail: rollback
        - uses: god-quality-reviewer@^1.0.0
          on-fail: rollback
    on-pass: commit-atomic

  feature-harden:
    tier: 3
    needs: feature-build
    uses: god-harden-auditor@^1.0.0
    with:
      mode: scope-to-new-code
    blocks-on:
      - critical-finding: pause

  feature-soft-launch:
    tier: 3
    needs: feature-harden
    uses: god-launch-strategist@^1.0.0
    with:
      mode: feature-flag-rollout

  feature-sync:
    tier: 0
    needs: feature-soft-launch
    uses: god-orchestrator@^1.0.0
    local-helper-groups:
      - source-sync-closeout
      - standard-closeout
    with:
      action: final-sync
      dashboard: action-brief
