apiVersion: godpowers/v1
kind: Extension
metadata:
  name: "@godpowers/data-pack"
  version: 0.1.0
  description: |
    Data engineering specialists. ETL pipelines, ML feature stores, dashboards.
    Refuses common data anti-patterns: stale features in prod, dashboards
    without SLOs, ETL without idempotency.

engines:
  godpowers: ">=2.0.0 <6.0.0"

provides:
  agents:
    - god-etl-engineer
    - god-ml-feature-engineer
    - god-dashboard-builder
  skills:
    - god-etl
    - god-ml-feature
    - god-dashboard
  workflows:
    - etl-arc
    - ml-feature-arc
    - dashboard-arc
  have-nots:
    - prefix: ETL
      description: ETL pipeline failure modes
    - prefix: ML
      description: ML feature failure modes
    - prefix: DASH
      description: Dashboard failure modes

activation:
  on:
    - skill: /god-etl
    - skill: /god-ml-feature
    - skill: /god-dashboard
